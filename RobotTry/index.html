<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Road Trip Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Initial Itinerary Data
        const initialStops = [
            { id: 1, day: "Day 1", name: "Start from Home (Whitefield)", predictedTime: "06:00", predictedWeather: "25°C, Clear", actualTime: null, actualWeather: "", locked: false, notes: "Car packed, ready to go!" },
            { id: 2, day: "Day 1", name: "Breakfast (Bidadi/Maddur)", predictedTime: "07:30", predictedWeather: "28°C, Sunny", actualTime: null, actualWeather: "", locked: false, notes: "Shree Renuka Thatte Idli or A2B (Pure Veg)." },
            { id: 3, day: "Day 1", name: "Somanathapura Temple", predictedTime: "10:00", predictedWeather: "36°C, Mostly Cloudy", actualTime: null, actualWeather: "", locked: false, notes: "Carry umbrellas for parents. Hydrate." },
            { id: 4, day: "Day 1", name: "Nanjangud Temple & Lunch", predictedTime: "12:45", predictedWeather: "36°C, PM Thunderstorms", actualTime: null, actualWeather: "", locked: false, notes: "Darshan and Udupi thali near temple." },
            { id: 5, day: "Day 1", name: "Night Halt (Gundlupet)", predictedTime: "16:30", predictedWeather: "34°C, Chance of Rain", actualTime: null, actualWeather: "", locked: false, notes: "Dinner at Shrinidhi Pure Veg. Rest well." },
            { id: 6, day: "Day 2", name: "Himavad Gopalaswamy Temple Base", predictedTime: "08:15", predictedWeather: "24°C, Misty/Cool", actualTime: null, actualWeather: "", locked: false, notes: "Park Kwid, take KSRTC forest shuttle." },
            { id: 7, day: "Day 2", name: "B.R. Hills Temple", predictedTime: "13:00", predictedWeather: "34°C, Mostly Cloudy", actualTime: null, actualWeather: "", locked: false, notes: "Temple closes at 14:00. Short walk from parking." },
            { id: 8, day: "Day 2", name: "Return Home (Whitefield)", predictedTime: "20:00", predictedWeather: "27°C, Clear", actualTime: null, actualWeather: "", locked: false, notes: "End of the 600+ km journey!" }
        ];

        function App() {
            const [stops, setStops] = useState(initialStops);
            const [liveTime, setLiveTime] = useState(new Date());
            const [isSimulated, setIsSimulated] = useState(false);
            const [simSpeed, setSimSpeed] = useState(1); // 1x is real-time, higher is faster

            // Master Clock Logic
            useEffect(() => {
                const interval = setInterval(() => {
                    if (isSimulated) {
                        setLiveTime(prev => new Date(prev.getTime() + (1000 * simSpeed)));
                    } else {
                        setLiveTime(new Date());
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [isSimulated, simSpeed]);

            // Helper to format Date objects to HH:MM
            const formatTime = (dateObj) => {
                return dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            };

            const markArrived = (id) => {
                const currentTimeStr = formatTime(liveTime);
                setStops(stops.map(stop => 
                    stop.id === id ? { ...stop, actualTime: currentTimeStr } : stop
                ));
            };

            const updateActualWeather = (id, value) => {
                setStops(stops.map(stop => 
                    stop.id === id ? { ...stop, actualWeather: value } : stop
                ));
            };

            const lockStop = (id) => {
                setStops(stops.map(stop => 
                    stop.id === id ? { ...stop, locked: true } : stop
                ));
            };

            // Calculate variance between predicted and actual times
            const calculateVariance = (predicted, actual) => {
                if (!actual) return null;
                const [pH, pM] = predicted.split(':').map(Number);
                const [aH, aM] = actual.split(':').map(Number);
                
                const pTotal = (pH * 60) + pM;
                const aTotal = (aH * 60) + aM;
                
                const diff = aTotal - pTotal;
                if (diff === 0) return <span className="text-gray-500 font-bold">On time</span>;
                if (diff > 0) return <span className="text-red-500 font-bold">+{diff} mins late</span>;
                return <span className="text-green-600 font-bold">{diff} mins early</span>;
            };

            return (
                <div className="max-w-3xl mx-auto py-8 px-4">
                    {/* Header & Clock Section */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8 text-center sticky top-4 z-10">
                        <h1 className="text-2xl font-bold text-slate-800 mb-2">Family Road Trip Tracker</h1>
                        <p className="text-slate-500 mb-4">Bengaluru → Somanathapura → Gundlupet → B.R. Hills</p>
                        <div className="text-4xl font-black text-blue-600 tracking-tight font-mono">
                            {formatTime(liveTime)}
                        </div>
                        
                        {/* Simulation Controls */}
                        <div className="mt-4 flex flex-wrap justify-center items-center gap-4 bg-slate-50 p-3 rounded-lg text-sm border border-slate-100">
                            <label className="flex items-center gap-2 cursor-pointer font-medium text-slate-700">
                                <input 
                                    type="checkbox" 
                                    checked={isSimulated} 
                                    onChange={(e) => setIsSimulated(e.target.checked)}
                                    className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500"
                                />
                                Enable Simulation Mode
                            </label>
                            {isSimulated && (
                                <select 
                                    value={simSpeed} 
                                    onChange={(e) => setSimSpeed(Number(e.target.value))}
                                    className="border border-slate-300 rounded px-2 py-1 bg-white text-slate-700"
                                >
                                    <option value={1}>1x (Real Time)</option>
                                    <option value={60}>60x (1 min = 1 sec)</option>
                                    <option value={3600}>3600x (1 hr = 1 sec)</option>
                                </select>
                            )}
                        </div>
                    </div>

                    {/* Timeline */}
                    <div className="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
                        
                        {stops.map((stop) => (
                            <div key={stop.id} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                {/* Timeline Dot */}
                                <div className={`flex items-center justify-center w-10 h-10 rounded-full border-4 border-white shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 ${stop.locked ? 'bg-green-500' : 'bg-blue-500'}`}>
                                    <span className="text-white text-xs font-bold">{stop.id}</span>
                                </div>
                                
                                {/* Stop Card */}
                                <div className={`w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white p-5 rounded-xl border shadow-sm transition-all duration-200 ${stop.locked ? 'border-green-200 bg-green-50/30' : 'border-slate-200 hover:shadow-md'}`}>
                                    <div className="flex justify-between items-start mb-2">
                                        <span className="text-xs font-bold uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-1 rounded">{stop.day}</span>
                                    </div>
                                    <h3 className="font-bold text-lg text-slate-800 leading-snug mb-3">{stop.name}</h3>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-4 text-sm">
                                        {/* Predicted Column */}
                                        <div className="bg-slate-50 p-3 rounded border border-slate-100">
                                            <p className="font-semibold text-slate-500 text-xs uppercase mb-1">Predicted</p>
                                            <p className="font-mono text-lg font-bold text-slate-700">{stop.predictedTime}</p>
                                            <p className="text-slate-600 mt-1 line-clamp-1" title={stop.predictedWeather}>{stop.predictedWeather}</p>
                                        </div>
                                        
                                        {/* Actual Column */}
                                        <div className="bg-blue-50 p-3 rounded border border-blue-100">
                                            <p className="font-semibold text-blue-600 text-xs uppercase mb-1">Actual</p>
                                            {stop.actualTime ? (
                                                <p className="font-mono text-lg font-bold text-blue-800">{stop.actualTime}</p>
                                            ) : (
                                                <p className="text-slate-400 italic">Pending...</p>
                                            )}
                                            
                                            {stop.locked ? (
                                                <p className="text-blue-800 mt-1 font-medium">{stop.actualWeather || "No weather recorded"}</p>
                                            ) : (
                                                <input 
                                                    type="text" 
                                                    placeholder="Actual weather?" 
                                                    value={stop.actualWeather}
                                                    onChange={(e) => updateActualWeather(stop.id, e.target.value)}
                                                    className="w-full mt-1 px-2 py-1 text-xs border border-blue-200 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                                                />
                                            )}
                                        </div>
                                    </div>

                                    {/* Variance Display */}
                                    {stop.actualTime && (
                                        <div className="mb-4 text-sm text-center bg-slate-50 py-1 rounded border border-slate-100">
                                            Variance: {calculateVariance(stop.predictedTime, stop.actualTime)}
                                        </div>
                                    )}

                                    {/* Notes */}
                                    <p className="text-sm text-slate-600 italic mb-4 border-l-2 border-slate-300 pl-2">
                                        "{stop.notes}"
                                    </p>

                                    {/* Actions */}
                                    {!stop.locked && (
                                        <div className="flex gap-2">
                                            {!stop.actualTime ? (
                                                <button 
                                                    onClick={() => markArrived(stop.id)}
                                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition-colors text-sm"
                                                >
                                                    Mark as Arrived
                                                </button>
                                            ) : (
                                                <button 
                                                    onClick={() => lockStop(stop.id)}
                                                    className="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 rounded transition-colors text-sm"
                                                >
                                                    Lock & Freeze Data
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
