<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TripTracker PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Distance Calculation (Haversine)
        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371; // Earth radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        };

        const initialStops = [
            { id: 1, name: "Home (Whitefield)", timeStr: "06:00", lat: 12.9698, lon: 77.7499, actualTime: null, weather: null, status: "pending" },
            { id: 2, name: "Breakfast (Bidadi)", timeStr: "07:30", lat: 12.7984, lon: 77.3871, actualTime: null, weather: null, status: "pending" },
            { id: 3, name: "Somanathapura Temple", timeStr: "10:00", lat: 12.2766, lon: 76.8824, actualTime: null, weather: null, status: "pending" },
            { id: 4, name: "Nanjangud Temple", timeStr: "12:45", lat: 12.1165, lon: 76.6775, actualTime: null, weather: null, status: "pending" },
            { id: 5, name: "Gundlupet Halt", timeStr: "16:30", lat: 11.8037, lon: 76.6841, actualTime: null, weather: null, status: "pending" },
            { id: 6, name: "Himavad Gopalaswamy Base", timeStr: "08:15", lat: 11.7208, lon: 76.6276, actualTime: null, weather: null, status: "pending" },
            { id: 7, name: "B.R. Hills Temple", timeStr: "13:00", lat: 11.9961, lon: 77.1384, actualTime: null, weather: null, status: "pending" },
            { id: 8, name: "Home (Whitefield)", timeStr: "20:00", lat: 12.9698, lon: 77.7499, actualTime: null, weather: null, status: "pending" }
        ];

        function App() {
            const [stops, setStops] = useState(initialStops);
            const [zoom, setZoom] = useState(2); // Pixel multiplier per minute
            const [userLoc, setUserLoc] = useState(null);

            // Time string to minutes since midnight
            const toMins = (timeStr) => {
                const [h, m] = timeStr.split(':').map(Number);
                return h * 60 + m;
            };

            // Fetch Weather via Open-Meteo
            const fetchWeather = async (lat, lon, id) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const data = await res.json();
                    if(data.current_weather) {
                        setStops(prev => prev.map(s => s.id === id ? { ...s, weather: `${data.current_weather.temperature}°C` } : s));
                    }
                } catch (e) {
                    console.log("Weather fetch failed");
                }
            };

            // Geolocation Tracking
            useEffect(() => {
                if (!navigator.geolocation) return;
                
                const watchId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    setUserLoc({ lat: latitude, lon: longitude });

                    setStops(prev => prev.map(stop => {
                        if (stop.status !== "arrived") {
                            const dist = getDistance(latitude, longitude, stop.lat, stop.lon);
                            // Auto-arrive if within 2km radius
                            if (dist <= 2) {
                                fetchWeather(stop.lat, stop.lon, stop.id);
                                return { ...stop, status: "arrived", actualTime: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
                            }
                        }
                        return stop;
                    }));
                }, (err) => console.log(err), { enableHighAccuracy: true });

                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            const manualArrive = (id, lat, lon) => {
                fetchWeather(lat, lon, id);
                setStops(prev => prev.map(s => 
                    s.id === id ? { ...s, status: "arrived", actualTime: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) } : s
                ));
            };

            return (
                <div className="max-w-lg mx-auto bg-white min-h-screen shadow-lg pb-20">
                    <div className="sticky top-0 z-50 bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
                        <h1 className="font-bold text-lg">Trip Tracker</h1>
                        <div className="flex gap-2">
                            <span className="text-xs bg-blue-700 px-2 py-1 rounded">Zoom:</span>
                            {[1, 2, 5].map(z => (
                                <button key={z} onClick={() => setZoom(z)} className={`px-2 py-1 text-xs rounded ${zoom === z ? 'bg-white text-blue-600' : 'bg-blue-800'}`}>{z}x</button>
                            ))}
                        </div>
                    </div>

                    <div className="relative p-6 ml-4 border-l-2 border-slate-200 mt-4">
                        {stops.map((stop, i) => {
                            let gap = 0;
                            if (i > 0) {
                                // Add 24h (1440 mins) if the next stop rolls over to the next day
                                let currMins = toMins(stop.timeStr);
                                let prevMins = toMins(stops[i-1].timeStr);
                                if (currMins < prevMins) currMins += 1440;
                                gap = (currMins - prevMins) * zoom; 
                            }

                            return (
                                <div key={stop.id} style={{ marginTop: `${gap}px` }} className="relative flex items-center group">
                                    <div className={`absolute -left-[35px] w-4 h-4 rounded-full border-2 ${stop.status === 'arrived' ? 'bg-green-500 border-green-500' : 'bg-white border-blue-400'}`}></div>
                                    <div className={`w-full p-4 rounded-lg border ${stop.status === 'arrived' ? 'bg-green-50 border-green-200' : 'bg-slate-50 border-slate-200'}`}>
                                        <div className="flex justify-between">
                                            <h3 className="font-bold text-slate-800 text-sm">{stop.name}</h3>
                                            <span className="text-xs font-mono text-slate-500">Target: {stop.timeStr}</span>
                                        </div>
                                        <div className="mt-2 text-xs flex justify-between items-end">
                                            <div>
                                                {stop.actualTime ? (
                                                    <span className="text-green-700 font-bold">Arrived: {stop.actualTime}</span>
                                                ) : (
                                                    <button onClick={() => manualArrive(stop.id, stop.lat, stop.lon)} className="bg-blue-100 text-blue-700 px-3 py-1 rounded font-medium">Mark Arrive</button>
                                                )}
                                            </div>
                                            {stop.weather && <span className="text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded">⛅ {stop.weather}</span>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('SW Registered')).catch(err => console.log('SW Failed', err));
            });
        }
    </script>
</body>
</html>
